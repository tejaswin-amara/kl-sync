<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="100%">
  <defs>
    <!-- Dark Tech Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="50%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>

    <!-- Animated Glowing Orbs Gradients -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-text" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#22d3ee" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <pattern id="gridPatternSmall" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#22d3ee" stroke-opacity="0.02" stroke-width="0.5"/>
    </pattern>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&amp;display=swap');
      
      .title {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-weight: 700;
        font-size: 64px;
        fill: #f8fafc;
        letter-spacing: -2px;
      }
      .title-glow {
        fill: #22d3ee;
        opacity: 0.8;
      }
      .subtitle {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-weight: 500;
        font-size: 18px;
        fill: #94a3b8;
        letter-spacing: 4px;
      }

      /* Orb animations */
      @keyframes floatOrb1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(50px, -30px) scale(1.1); }
      }
      @keyframes floatOrb2 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(-40px, 40px) scale(0.9); }
      }
      .orb-1 { animation: floatOrb1 15s ease-in-out infinite; transform-origin: center; }
      .orb-2 { animation: floatOrb2 20s ease-in-out infinite; transform-origin: center; }

      /* Grid pan */
      @keyframes panGrid {
        0% { transform: translateY(0); }
        100% { transform: translateY(40px); }
      }
      .moving-grid { animation: panGrid 4s linear infinite; }

      /* Data lines */
      @keyframes dash {
        0% { stroke-dashoffset: 1000; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 0; }
      }
      .line {
        stroke-dasharray: 200 800;
        animation: dash 8s linear infinite;
      }
      .line-1 { animation-delay: 0s; stroke: #22d3ee; }
      .line-2 { animation-delay: -4s; stroke: #818cf8; }
      .line-3 { animation-delay: -2s; stroke: #38bdf8; }

      /* Typing cursor */
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      .cursor { animation: blink 1s step-end infinite; }
      
      /* Subtle scanline */
      @keyframes scan {
        0% { transform: translateY(-300px); }
        100% { transform: translateY(300px); }
      }
      .scanline {
        animation: scan 6s linear infinite;
      }
    </style>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Animated Orbs -->
  <circle cx="20%" cy="30%" r="300" fill="url(#orb1)" class="orb-1" />
  <circle cx="80%" cy="70%" r="400" fill="url(#orb2)" class="orb-2" />

  <!-- Animated Grids -->
  <g class="moving-grid">
    <rect x="-40" y="-40" width="1300" height="400" fill="url(#gridPatternSmall)" />
    <rect x="-40" y="-40" width="1300" height="400" fill="url(#gridPattern)" />
  </g>

  <!-- Data Lines (Tech vibe) -->
  <g filter="url(#glow)" opacity="0.6">
    <path class="line line-1" d="M -100 80 L 300 80 L 400 120 L 1300 120" fill="none" stroke-width="2" />
    <path class="line line-2" d="M -100 200 L 800 200 L 900 160 L 1300 160" fill="none" stroke-width="1.5" />
    <path class="line line-3" d="M 1300 50 L 700 50 L 600 90 L -100 90" fill="none" stroke-width="1" />
  </g>

  <!-- Dark overlay mask to blend grid and lines at edges -->
  <linearGradient id="edgeMask" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#09090b" stop-opacity="1"/>
    <stop offset="10%" stop-color="#09090b" stop-opacity="0"/>
    <stop offset="90%" stop-color="#09090b" stop-opacity="0"/>
    <stop offset="100%" stop-color="#09090b" stop-opacity="1"/>
  </linearGradient>
  <rect width="100%" height="100%" fill="url(#edgeMask)" />

  <linearGradient id="edgeMaskY" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#09090b" stop-opacity="1"/>
    <stop offset="10%" stop-color="#09090b" stop-opacity="0"/>
    <stop offset="80%" stop-color="#09090b" stop-opacity="0"/>
    <stop offset="100%" stop-color="#09090b" stop-opacity="1"/>
  </linearGradient>
  <rect width="100%" height="100%" fill="url(#edgeMaskY)" />

  <!-- Scanning line overlay -->
  <rect width="100%" height="100%" fill="rgba(34, 211, 238, 0.03)" class="scanline" />

  <!-- Typography -->
  <!-- Glowing back text -->
  <text x="50%" y="125" dominant-baseline="middle" text-anchor="middle" class="title title-glow" filter="url(#glow-text)">Tejaswin Amara</text>
  <!-- Foreground text -->
  <text x="50%" y="125" dominant-baseline="middle" text-anchor="middle" class="title">Tejaswin Amara</text>
  
  <text x="50%" y="185" dominant-baseline="middle" text-anchor="middle" class="subtitle">
    AI-ASSISTED DEVELOPER &amp; TECH SUPPORT SPECIALIST<tspan fill="#22d3ee" class="cursor">_</tspan>
  </text>
  
  <!-- Subtle decorative brackets -->
  <text x="15%" y="125" dominant-baseline="middle" text-anchor="middle" font-family="Space Grotesk" font-size="80" fill="#22d3ee" opacity="0.1">&lt;</text>
  <text x="85%" y="125" dominant-baseline="middle" text-anchor="middle" font-family="Space Grotesk" font-size="80" fill="#22d3ee" opacity="0.1">&gt;</text>
</svg>