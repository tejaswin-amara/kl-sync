<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="100%">
  <defs>
    <!-- Dark Tech Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="50%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>

    <!-- Animated Glowing Orbs Gradients -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="gridPatternSmall" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#22d3ee" stroke-opacity="0.02" stroke-width="0.5"/>
    </pattern>

    <style>
      /* Orb animations */
      @keyframes floatOrb1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(30px, -10px) scale(1.1); }
      }
      @keyframes floatOrb2 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(-20px, 20px) scale(0.9); }
      }
      .orb-1 { animation: floatOrb1 15s ease-in-out infinite; transform-origin: center; }
      .orb-2 { animation: floatOrb2 20s ease-in-out infinite; transform-origin: center; }

      /* Grid pan */
      @keyframes panGrid {
        0% { transform: translateY(0); }
        100% { transform: translateY(10px); }
      }
      .moving-grid { animation: panGrid 4s linear infinite; }

      /* Data lines */
      @keyframes dash {
        0% { stroke-dashoffset: 1000; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 0; }
      }
      .line {
        stroke-dasharray: 200 800;
        animation: dash 8s linear infinite;
      }
      .line-1 { animation-delay: -3s; stroke: #22d3ee; }
      .line-2 { animation-delay: -7s; stroke: #818cf8; }
      
      @keyframes glowPulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      .signal { animation: glowPulse 3s ease-in-out infinite; fill: #22d3ee; }
    </style>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Animated Orbs -->
  <circle cx="20%" cy="50%" r="200" fill="url(#orb1)" class="orb-1" />
  <circle cx="80%" cy="50%" r="250" fill="url(#orb2)" class="orb-2" />

  <!-- Animated Grids -->
  <g class="moving-grid">
    <rect x="-40" y="-40" width="1300" height="200" fill="url(#gridPatternSmall)" />
  </g>

  <!-- Data Lines (Tech vibe) -->
  <g filter="url(#glow)" opacity="0.6">
    <path class="line line-1" d="M -100 40 L 400 40 L 450 60 L 1300 60" fill="none" stroke-width="1.5" />
    <path class="line line-2" d="M 1300 80 L 800 80 L 750 60 L -100 60" fill="none" stroke-width="1" />
  </g>
  
  <!-- Audio/Signal bars in center -->
  <g transform="translate(560, 50)" class="signal">
    <rect x="0" y="10" width="3" height="10">
      <animate attributeName="height" values="10;20;5;15;10" dur="1s" repeatCount="indefinite" />
      <animate attributeName="y" values="10;5;12.5;7.5;10" dur="1s" repeatCount="indefinite" />
    </rect>
    <rect x="8" y="5" width="3" height="20">
      <animate attributeName="height" values="20;5;15;25;20" dur="1.2s" repeatCount="indefinite" />
      <animate attributeName="y" values="5;12.5;7.5;2.5;5" dur="1.2s" repeatCount="indefinite" />
    </rect>
    <rect x="16" y="2" width="3" height="26">
      <animate attributeName="height" values="26;15;20;10;26" dur="0.9s" repeatCount="indefinite" />
      <animate attributeName="y" values="2;7.5;5;10;2" dur="0.9s" repeatCount="indefinite" />
    </rect>
    <rect x="24" y="5" width="3" height="20">
      <animate attributeName="height" values="20;30;10;15;20" dur="1.1s" repeatCount="indefinite" />
      <animate attributeName="y" values="5;0;10;7.5;5" dur="1.1s" repeatCount="indefinite" />
    </rect>
    <rect x="32" y="12" width="3" height="6">
      <animate attributeName="height" values="6;15;10;5;6" dur="1.3s" repeatCount="indefinite" />
      <animate attributeName="y" values="12;7.5;10;12.5;12" dur="1.3s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Dark overlay mask to blend grid and lines at edges -->
  <linearGradient id="edgeMask" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#09090b" stop-opacity="1"/>
    <stop offset="10%" stop-color="#09090b" stop-opacity="0"/>
    <stop offset="90%" stop-color="#09090b" stop-opacity="0"/>
    <stop offset="100%" stop-color="#09090b" stop-opacity="1"/>
  </linearGradient>
  <rect width="100%" height="100%" fill="url(#edgeMask)" />

  <linearGradient id="edgeMaskY" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#09090b" stop-opacity="1"/>
    <stop offset="10%" stop-color="#09090b" stop-opacity="0"/>
    <stop offset="80%" stop-color="#09090b" stop-opacity="0"/>
    <stop offset="100%" stop-color="#09090b" stop-opacity="1"/>
  </linearGradient>
  <rect width="100%" height="100%" fill="url(#edgeMaskY)" />

  <!-- Scanning line overlay -->
  <rect width="100%" height="100%" fill="rgba(34, 211, 238, 0.03)" class="scanline" />
  <style>
      @keyframes scanFooter {
        0% { transform: translateY(-100px); }
        100% { transform: translateY(100px); }
      }
      .scanline {
        animation: scanFooter 6s linear infinite;
      }
  </style>
</svg>